<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ogori-games — 誰が払う?決めるゲーム集</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ① 参加者入力画面 -->
  <section id="screen-players" class="screen is-active">
    <header class="app-header">
      <h1 class="app-title">🍻 ogori-games</h1>
      <p class="app-subtitle">誰が払う?決めるゲーム集</p>
    </header>

    <div class="card">
      <h2 class="section-title">参加者を入力(2〜12人)</h2>
      <form id="player-form" class="player-form" autocomplete="off">
        <input
          type="text"
          id="player-name-input"
          class="text-input"
          placeholder="名前を入力してEnter"
          maxlength="10"
        >
        <button type="submit" id="add-player-btn" class="btn btn-secondary">追加</button>
      </form>
      <p id="player-error" class="error-message" role="alert" aria-live="polite"></p>

      <ul id="player-list" class="player-list"></ul>
      <p id="player-count" class="player-count">0人 / 2〜12人</p>
    </div>

    <button id="go-to-games-btn" class="btn btn-primary btn-large" disabled>ゲーム選択へ →</button>
  </section>

  <!-- ② ゲーム選択画面 -->
  <section id="screen-games" class="screen">
    <header class="app-header">
      <h1 class="app-title">🎮 ゲームを選ぼう</h1>
      <p class="app-subtitle">負けたら(当たったら)全額おごり!</p>
    </header>

    <div class="game-card-list">
      <button class="game-card" data-game="roulette">
        <span class="game-card-emoji">🎡</span>
        <span class="game-card-name">男気ルーレット</span>
        <span class="game-card-desc">回して止まったら払う人決定</span>
      </button>
      <button class="game-card" data-game="high-low">
        <span class="game-card-emoji">🃏</span>
        <span class="game-card-name">ハイ&ロー</span>
        <span class="game-card-desc">一番弱いカードの人が払う</span>
      </button>
      <button class="game-card" data-game="chinchiro">
        <span class="game-card-emoji">🎲</span>
        <span class="game-card-name">チンチロ</span>
        <span class="game-card-desc">出た目の役が一番弱い人が払う</span>
      </button>
      <button class="game-card" data-game="amidakuji">
        <span class="game-card-emoji">🪜</span>
        <span class="game-card-name">あみだくじ</span>
        <span class="game-card-desc">線をたどって支払い運命の人へ</span>
      </button>
    </div>

    <button id="back-to-players-btn" class="btn btn-secondary btn-large">← 参加者を変更</button>
  </section>

  <!-- ③-a 男気ルーレット画面 -->
  <section id="screen-roulette" class="screen">
    <header class="app-header">
      <h1 class="app-title">🎡 男気ルーレット</h1>
      <p class="app-subtitle" id="roulette-status">回してみよう!</p>
    </header>
    <div class="card game-stage">
      <div class="roulette-wrap">
        <canvas id="roulette-canvas" width="320" height="320"></canvas>
        <div class="roulette-pointer" aria-hidden="true">▼</div>
      </div>
      <button id="roulette-spin-btn" class="btn btn-primary btn-large">回す!</button>
    </div>
    <button class="btn btn-text back-to-games-btn">← ゲーム選択に戻る</button>
  </section>

  <!-- ③-b ハイ&ロー画面 -->
  <section id="screen-high-low" class="screen">
    <header class="app-header">
      <h1 class="app-title">🃏 ハイ&ロー</h1>
      <p class="app-subtitle" id="high-low-status">カードを引こう!</p>
    </header>
    <div class="card game-stage">
      <p id="high-low-turn-label" class="turn-label"></p>
      <div class="card-flip-wrap">
        <button id="high-low-card-btn" class="playing-card" type="button" aria-label="カードをめくる">
          <span class="playing-card-back">🍀</span>
          <span class="playing-card-front" id="high-low-card-front"></span>
        </button>
      </div>
      <ul id="high-low-result-list" class="draw-result-list"></ul>
    </div>
    <button class="btn btn-text back-to-games-btn">← ゲーム選択に戻る</button>
  </section>

  <!-- ③-c チンチロ画面 -->
  <section id="screen-chinchiro" class="screen">
    <header class="app-header">
      <h1 class="app-title">🎲 チンチロ</h1>
      <p class="app-subtitle" id="chinchiro-status">サイコロを振ろう!</p>
    </header>
    <div class="card game-stage">
      <p id="chinchiro-turn-label" class="turn-label"></p>
      <div class="dice-wrap">
        <div class="die" id="chinchiro-die-0">?</div>
        <div class="die" id="chinchiro-die-1">?</div>
        <div class="die" id="chinchiro-die-2">?</div>
      </div>
      <button id="chinchiro-roll-btn" class="btn btn-primary btn-large">振る!</button>
      <ul id="chinchiro-result-list" class="draw-result-list"></ul>
    </div>
    <button class="btn btn-text back-to-games-btn">← ゲーム選択に戻る</button>
  </section>

  <!-- ③-d あみだくじ画面 -->
  <section id="screen-amidakuji" class="screen">
    <header class="app-header">
      <h1 class="app-title">🪜 あみだくじ</h1>
      <p class="app-subtitle" id="amidakuji-status">上の枠を選んでね</p>
    </header>
    <div class="card game-stage">
      <p id="amidakuji-turn-label" class="turn-label"></p>
      <div class="amidakuji-wrap">
        <canvas id="amidakuji-canvas" width="320" height="320"></canvas>
        <div id="amidakuji-top-buttons" class="amidakuji-top-buttons"></div>
        <div id="amidakuji-bottom-labels" class="amidakuji-bottom-labels"></div>
      </div>
      <button id="amidakuji-reveal-btn" class="btn btn-primary btn-large" disabled>結果を見る!</button>
    </div>
    <button class="btn btn-text back-to-games-btn">← ゲーム選択に戻る</button>
  </section>

  <!-- ④ 結果画面 -->
  <section id="screen-result" class="screen">
    <div class="result-confetti" id="result-confetti" aria-hidden="true"></div>
    <div class="result-content">
      <p class="result-lead">支払者は…</p>
      <h2 id="result-payer-name" class="result-payer-name">-</h2>
      <p class="result-message">さんのおごり!🎉</p>
      <div class="result-actions">
        <button id="result-replay-btn" class="btn btn-primary btn-large">もう一回</button>
        <button id="result-back-to-games-btn" class="btn btn-secondary btn-large">ゲーム選択に戻る</button>
      </div>
    </div>
  </section>

</div>

<script src="js/app.js"></script>
<script src="js/sound.js"></script>
<script src="js/roulette.js"></script>
<script src="js/high-low.js"></script>
<script src="js/chinchiro.js"></script>
<script src="js/amidakuji.js"></script>
</body>
</html>
